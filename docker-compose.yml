services:
  postgres:
    image: postgres:17-alpine
    container_name: tinggo-postgres
    environment:
      POSTGRES_USER: tinggo
      POSTGRES_PASSWORD: tinggo_dev
      POSTGRES_DB: tinggo
    ports:
      - "5433:5432"   # 5433 vì máy dev có Postgres local chiếm 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinggo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tinggo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # SMTP giả lập cho OTP email khi dev (ADR-003). UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: tinggo-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
